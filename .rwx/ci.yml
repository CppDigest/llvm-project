#
# RWX CI — CppDigest/llvm-project (Linux monolithic build)
#
# Migrated from .ci/monolithic-linux.sh + GitHub Actions.
# DAG: deps/sccache → clone+configure (single task) → build → parallel checks → report
# Clone runs inside cmake-configure so Mint passes full tree to cmake (no sparse workspace).
# Linux-only. Matrix (conceptual): single config LLVM_ENABLE_PROJECTS=clang; extend via
# additional tasks or init vars for more projects/configs if needed.
#
# RWX workflow parameters and packages (reference):
#   https://github.com/rwx-cloud/packages  — Packages for CI/CD on RWX (call:, versions)
#   https://www.rwx.com/docs/mint          — Mint (workflow) docs
#   https://www.rwx.com/docs/mint/caching  — Content-based cache; filter drives cache key
#   https://www.rwx.com/docs/mint/call-packages
#
# Caching: Content-based task cache + tool-cache for incremental builds.
# install-build-deps / install-sccache cache on .rwx/ci.yml.
# cmake-configure and build-llvm-core use tool-cache to persist full workspace
# (llvm-src + build + tmp/sccache). On restore: git pull (not clone) fetches only
# changed files; ninja does incremental build. Target: 10x–100x speedup on small
# changes. Requires vault for tool-cache (see RWX tool-caches docs). Increase
# RWX workspace cache limit if builds are large.
#
# Prerequisites:
#   1. RWX org with GitHub App "CppDigest" (slug: cppdigest-test) in Vault
#   2. App installed on CppDigest/llvm-project with Contents + PR permissions
#   3. Vault "cppdigest-llvm-workspace" for tool-cache (persists llvm-src + build).
#      Create in RWX dashboard; increase cache limit for large workspaces (~10–20GB).
#
# Local test: rwx run .rwx/ci.yml --init commit-sha=HEAD --init clone-url=<repo-clone-url> --init branch=<branch>
#
# RWX CLI / MCP — early failure detection & log retrieval (for optimizer/postmortem):
#   rwx runs list                          — list recent runs
#   rwx runs watch <run-id>               — stream live logs
#   rwx runs logs <run-id> <task-key>     — retrieve task-level logs
#
# Session/iteration (optional): set RUN_SESSION and RUN_ITERATION env when invoking
# (e.g. from .rwx/optimizer.sh) for postmortem_report.py to correlate runs.
#

on:
  github:
    push:
      init:
        commit-sha: ${{ event.git.sha }}
        clone-url: ${{ event.github.push.repository.clone_url }}
        branch: ${{ event.git.branch }}
        run_session: 'na'
        run_iteration: 'na'
    pull_request:
      init:
        commit-sha: ${{ event.git.sha }}
        clone-url: ${{ event.github.pull_request.pull_request.head.repo.clone_url }}
        branch: ${{ event.git.branch }}
        run_session: 'na'
        run_iteration: 'na'

base:
  image: ubuntu:24.04
  config: rwx/base 1.0.0

tasks:
  # ---------- Stage 1: toolchain ----------

  - key: install-build-deps
    timeout: 5m
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        cmake ninja-build clang lld \
        python3 python3-pip python-is-python3 \
        libxml2-dev libedit-dev libncurses5-dev swig \
        build-essential
      pip install --break-system-packages -q lit psutil
    cache: true
    filter:
      - .rwx/ci.yml

  - key: install-sccache
    timeout: 2m
    run: |
      wget -q https://github.com/mozilla/sccache/releases/download/v0.8.2/sccache-v0.8.2-x86_64-unknown-linux-musl.tar.gz
      tar xzf sccache-v0.8.2-x86_64-unknown-linux-musl.tar.gz
      sudo mv sccache-v0.8.2-x86_64-unknown-linux-musl/sccache /usr/local/bin/
      chmod +x /usr/local/bin/sccache
    cache: true
    filter:
      - .rwx/ci.yml

  # ---------- Stage 2: clone + cmake (one task so cmake sees full tree) ----------

  - key: cmake-configure
    use: [install-build-deps, install-sccache]
    timeout: 15m
    agent:
      cpus: 16
      memory: 32GB
    env:
      SCCACHE_CACHE_SIZE: 5G
    run: |
      set -e
      WORKSPACE_ROOT=$(pwd)
      export SCCACHE_DIR="$WORKSPACE_ROOT/tmp/sccache"
      BUILD_DIR="$WORKSPACE_ROOT/build"

      # Clone or pull: when tool-cache restores workspace, git fetch fetches only
      # changed objects (10x–100x faster than full clone on small changes)
      if [ -d llvm-src/.git ]; then
        cd llvm-src
        git fetch origin ${{ init.branch }} --depth 50
        git checkout -f ${{ init.commit-sha }}
        cd "$WORKSPACE_ROOT"
      else
        git clone --depth 50 --branch ${{ init.branch }} ${{ init.clone-url }} llvm-src
        cd llvm-src
        git checkout ${{ init.commit-sha }}
        git config core.sparseCheckout false
        git sparse-checkout set --no-cone '/*' 2>/dev/null || true
        git checkout -f ${{ init.commit-sha }}
        cd "$WORKSPACE_ROOT"
      fi
      test -f llvm-src/llvm/cmake/config-ix.cmake || { echo "Missing llvm/cmake/config-ix.cmake"; exit 1; }
      test -f llvm-src/cmake/Modules/CMakePolicy.cmake || { echo "Missing cmake/Modules/CMakePolicy.cmake (need full llvm-project)"; exit 1; }
      test -f llvm-src/llvm/LICENSE.TXT || { echo "Missing llvm/LICENSE.TXT"; exit 1; }

      mkdir -p "$WORKSPACE_ROOT/tmp/sccache"
      sccache --zero-stats
      # Do not rm CMakeCache.txt — keep for incremental cmake when tool-cache restores build/

      cmake -S "$WORKSPACE_ROOT/llvm-src/llvm" -B "$BUILD_DIR" \
        -D LLVM_ENABLE_PROJECTS="clang" \
        -G Ninja \
        -D CMAKE_BUILD_TYPE=Release \
        -D CMAKE_CXX_FLAGS_RELEASE="-O2 -DNDEBUG" \
        -D CMAKE_C_FLAGS_RELEASE="-O2 -DNDEBUG" \
        -D LLVM_ENABLE_ASSERTIONS=ON \
        -D LLVM_BUILD_EXAMPLES=OFF \
        -D LLVM_LIT_ARGS="-v --xunit-xml-output $BUILD_DIR/test-results.xml --use-unique-output-file-name --timeout=1200 --time-tests --succinct" \
        -D LLVM_ENABLE_LLD=OFF \
        -D CMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld" \
        -D CMAKE_SHARED_LINKER_FLAGS="-fuse-ld=lld" \
        -D CMAKE_CXX_FLAGS="-g1 -fuse-ld=lld -Wno-dangling-pointer -Wno-unused-but-set-parameter -Wno-stringop-overflow -Wno-free-nonheap-object -Wno-return-local-addr" \
        -D CMAKE_C_COMPILER_LAUNCHER=sccache \
        -D CMAKE_CXX_COMPILER_LAUNCHER=sccache \
        -D CMAKE_DISABLE_PRECOMPILE_HEADERS=ON \
        -D CMAKE_INSTALL_PREFIX="$BUILD_DIR/install" \
        -D LLVM_ENABLE_WERROR=OFF
    cache: true
    filter:
      - llvm-src/**
      - llvm-src/cmake/**
      - build/**
      - tmp/sccache/**
      - .rwx/ci.yml

  # ---------- Stage 3: build core ----------

  - key: build-llvm-core
    use: [cmake-configure]
    timeout: 60m
    agent:
      cpus: 16
      memory: 32GB
    env:
      SCCACHE_CACHE_SIZE: 5G
    run: |
      TASK_START=$(date +%s)
      WORKSPACE_ROOT=$(pwd)
      export SCCACHE_DIR="$WORKSPACE_ROOT/tmp/sccache"
      BUILD_DIR="$WORKSPACE_ROOT/build"
      mkdir -p "$WORKSPACE_ROOT/tmp"

      ninja -C "$BUILD_DIR" -j$(nproc) -k 0 \
        llvm-libraries clang \
        llvm-ar llvm-nm llvm-objcopy llvm-objdump llvm-symbolizer \
        2>&1 | tee "$WORKSPACE_ROOT/tmp/ninja-core.log"

      TASK_END=$(date +%s)
      sccache --show-stats

      # Write timing to unique file (avoids merge conflicts in parallel tasks)
      mkdir -p "$WORKSPACE_ROOT/tmp/timing"
      echo "$((TASK_END - TASK_START))|build-llvm-core|SUCCESS" > "$WORKSPACE_ROOT/tmp/timing/build-llvm-core.log"
      sccache --show-stats > "$WORKSPACE_ROOT/tmp/timing/sccache-build.txt" 2>&1
    cache: true
    filter:
      - llvm-src/**
      - llvm-src/cmake/**
      - build/**
      - tmp/sccache/**
      - tmp/**

  # ---------- Stage 4: parallel checks ----------
  #
  # Each check task writes timing to its own file under tmp/timing/
  # to avoid file-merge conflicts when performance-analysis reads them.

  - key: check-llvm
    use: [build-llvm-core]
    timeout: 30m
    agent:
      cpus: 16
      memory: 32GB
    outputs:
      filesystem: false
      artifacts:
        - key: timing
          path: tmp/timing
    run: |
      TASK_START=$(date +%s)
      WORKSPACE_ROOT=$(pwd)
      BUILD_DIR="$WORKSPACE_ROOT/build"
      mkdir -p "$WORKSPACE_ROOT/tmp/timing"

      ninja -C "$BUILD_DIR" -j$(nproc) check-llvm 2>&1 | tee "$BUILD_DIR/check-llvm.log"
      RETCODE=${PIPESTATUS[0]}

      TASK_END=$(date +%s)
      STATUS=$( [ $RETCODE -eq 0 ] && echo "SUCCESS" || echo "FAIL" )
      echo "$((TASK_END - TASK_START))|check-llvm|${STATUS}" > "$WORKSPACE_ROOT/tmp/timing/check-llvm.log"
      exit $RETCODE
    filter:
      - llvm-src/llvm/**
      - llvm-src/clang/**
      - llvm-src/cmake/**
      - llvm-src/third-party/**
      - llvm-src/.git/**
      - build/**
      - tmp/**

  - key: check-clang
    use: [build-llvm-core]
    timeout: 30m
    agent:
      cpus: 16
      memory: 32GB
    outputs:
      filesystem: false
      artifacts:
        - key: timing
          path: tmp/timing
    run: |
      TASK_START=$(date +%s)
      WORKSPACE_ROOT=$(pwd)
      BUILD_DIR="$WORKSPACE_ROOT/build"
      mkdir -p "$WORKSPACE_ROOT/tmp/timing"

      ninja -C "$BUILD_DIR" -j$(nproc) check-clang 2>&1 | tee "$BUILD_DIR/check-clang.log"
      RETCODE=${PIPESTATUS[0]}

      TASK_END=$(date +%s)
      STATUS=$( [ $RETCODE -eq 0 ] && echo "SUCCESS" || echo "FAIL" )
      echo "$((TASK_END - TASK_START))|check-clang|${STATUS}" > "$WORKSPACE_ROOT/tmp/timing/check-clang.log"
      exit $RETCODE
    filter:
      - llvm-src/clang/**
      - llvm-src/llvm/**
      - llvm-src/cmake/**
      - llvm-src/third-party/**
      - llvm-src/.git/**
      - build/**
      - tmp/**

  # ---------- Stage 5: report (runs even if checks fail) ----------

  - key: performance-analysis
    use: [check-llvm, check-clang]
    timeout: 5m
    run: |
      set -e
      WORKSPACE_ROOT=$(pwd)
      TIMING_DIR="$WORKSPACE_ROOT/tmp/timing"
      mkdir -p "$TIMING_DIR"

      # Copy only timing artifacts (not full task output) to stay under disk quota
      cp -a "${{ tasks.check-llvm.artifacts.timing }}"/* "$TIMING_DIR/" 2>/dev/null || true
      cp -a "${{ tasks.check-clang.artifacts.timing }}"/* "$TIMING_DIR/" 2>/dev/null || true

      # Log run metadata for postmortem (session/iteration from optimizer or init)
      RUN_SESSION="${{ init.run_session }}"
      RUN_ITERATION="${{ init.run_iteration }}"
      echo "run_session=$RUN_SESSION run_iteration=$RUN_ITERATION timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$TIMING_DIR/run_meta.log"

      echo ""
      echo "=== RWX CI PERFORMANCE REPORT — LLVM ==="
      echo ""

      # Task timing logs use format: duration|task_key|SUCCESS| or |FAIL|
      TIMING_LOGS="$TIMING_DIR/build-llvm-core.log $TIMING_DIR/check-llvm.log $TIMING_DIR/check-clang.log"
      if for f in $TIMING_LOGS; do [ -f "$f" ] && cat "$f"; done | grep -q .; then
        echo "Task Timings (sorted by duration):"
        echo "------------------------------------------------------------"
        for f in $TIMING_LOGS; do [ -f "$f" ] && cat "$f"; done | sort -t'|' -k1 -rn | while IFS='|' read -r duration task status; do
          printf "  %-30s %6ss  [%s]\n" "$task" "$duration" "$status"
        done
        echo ""

        TOTAL=0
        while IFS='|' read -r duration task status; do
          TOTAL=$((TOTAL + duration))
        done < <(for f in $TIMING_LOGS; do [ -f "$f" ] && cat "$f"; done)
        echo "Sequential total: ${TOTAL}s"

        FAILURES=$(for f in $TIMING_LOGS; do [ -f "$f" ] && cat "$f"; done | grep "FAIL" | wc -l)
        if [ "$FAILURES" -gt 0 ]; then
          echo ""
          echo "FAILED:"
          for f in $TIMING_LOGS; do [ -f "$f" ] && cat "$f"; done | grep "FAIL" | while IFS='|' read -r d t s; do
            echo "  - $t (${d}s)"
          done
        fi
      else
        echo "No timing data found."
      fi

      echo ""
      if [ -f "$TIMING_DIR/sccache-build.txt" ]; then
        echo "Sccache (build-llvm-core):"
        echo "------------------------------------------------------------"
        cat "$TIMING_DIR/sccache-build.txt"
      fi

      # ---------- Benchmark: RWX vs GitHub Actions ----------
      # Load baseline from .rwx/gha-baseline.env if present (populated from GHA run)
      if [ -f "$WORKSPACE_ROOT/.rwx/gha-baseline.env" ]; then . "$WORKSPACE_ROOT/.rwx/gha-baseline.env"; fi
      GHA_CONFIGURE_S=${GHA_CONFIGURE_S:-0}
      GHA_BUILD_S=${GHA_BUILD_S:-0}
      GHA_CHECK_S=${GHA_CHECK_S:-0}
      GHA_TOTAL_S=${GHA_TOTAL_S:-0}

      if [ "$GHA_TOTAL_S" -gt 0 ] 2>/dev/null; then
        echo ""
        echo "Benchmark — RWX vs GitHub Actions:"
        echo "------------------------------------------------------------"
        printf "  %-20s %8s %8s %8s\n" "Stage" "GHA(s)" "RWX(s)" "Delta"
        printf "  %-20s %8s %8s %8s\n" "----" "------" "------" "-----"

        RWX_BUILD=0; RWX_CHECK=0
        if [ -f "$TIMING_DIR/build-llvm-core.log" ]; then
          RWX_BUILD=$(cut -d'|' -f1 "$TIMING_DIR/build-llvm-core.log")
        fi
        for f in "$TIMING_DIR"/check-*.log; do
          [ -f "$f" ] && RWX_CHECK=$((RWX_CHECK + $(cut -d'|' -f1 "$f")))
        done

        printf "  %-20s %8s %8s %+8s\n" "Build" "$GHA_BUILD_S" "$RWX_BUILD" "$((RWX_BUILD - GHA_BUILD_S))"
        printf "  %-20s %8s %8s %+8s\n" "Checks (seq)" "$GHA_CHECK_S" "$RWX_CHECK" "$((RWX_CHECK - GHA_CHECK_S))"
        printf "  %-20s %8s %8s %+8s\n" "Total" "$GHA_TOTAL_S" "$TOTAL" "$((TOTAL - GHA_TOTAL_S))"
      else
        echo ""
        echo "Benchmark: Set GHA_CONFIGURE_S, GHA_BUILD_S, GHA_CHECK_S, GHA_TOTAL_S env vars to compare against GitHub Actions."
        echo "Reference: Check upstream llvm-project GHA history — https://github.com/llvm/llvm-project/actions"
      fi
    filter:
      - .rwx/ci.yml
      - tmp/**
