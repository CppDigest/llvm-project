#
# RWX CI — CppDigest/llvm-project (Linux monolithic build)
#
# Single build-and-test task to avoid cross-task file transfer issues.
# DAG: clone → deps/sccache → build-and-test → report
#

on:
  github:
    push:
      init:
        commit-sha: ${{ event.git.sha }}
        clone-url: ${{ event.github.push.repository.clone_url }}
        branch: ${{ event.git.branch }}
    pull_request:
      init:
        commit-sha: ${{ event.git.sha }}
        clone-url: ${{ event.github.pull_request.pull_request.head.repo.clone_url }}
        branch: ${{ event.git.branch }}

base:
  image: ubuntu:24.04
  config: rwx/base 1.0.0

tasks:
  # ---------- Stage 1: clone + toolchain ----------

  - key: clone-repo
    timeout: 10m
    run: |
      git clone --depth 50 --branch ${{ init.branch }} ${{ init.clone-url }} llvm-project
      cd llvm-project
      git checkout ${{ init.commit-sha }}
    filter:
      - llvm-project/**

  - key: install-build-deps
    timeout: 5m
    run: |
      # v4: single build-and-test task
      sudo apt-get update
      sudo apt-get install -y \
        cmake ninja-build clang lld \
        python3 python3-pip python-is-python3 \
        libxml2-dev libedit-dev libncurses5-dev swig \
        build-essential
      pip install --break-system-packages -q lit psutil nanobind packaging
    cache: true
    filter:
      - .rwx/ci.yml

  - key: install-sccache
    timeout: 2m
    run: |
      wget -q https://github.com/mozilla/sccache/releases/download/v0.8.2/sccache-v0.8.2-x86_64-unknown-linux-musl.tar.gz
      tar xzf sccache-v0.8.2-x86_64-unknown-linux-musl.tar.gz
      sudo mv sccache-v0.8.2-x86_64-unknown-linux-musl/sccache /usr/local/bin/
      chmod +x /usr/local/bin/sccache
    cache: true
    filter:
      - .rwx/ci.yml

  # ---------- Stage 2: configure + build + test (single task) ----------
  #
  # All stages run in one task to avoid RWX use/filter file transfer issues.
  # With 16 CPUs, the full build completes much faster than 2-core parallel tasks.

  - key: build-and-test
    use: [clone-repo, install-build-deps, install-sccache]
    timeout: 120m
    agent:
      cpus: 16
      memory: 32GB
    env:
      SCCACHE_CACHE_SIZE: 10G
    run: |
      set +e
      WORKSPACE_ROOT=$(pwd)
      export SCCACHE_DIR="$WORKSPACE_ROOT/tmp/sccache"
      BUILD_DIR="$WORKSPACE_ROOT/build"
      mkdir -p "$WORKSPACE_ROOT/tmp/timing"

      # ---- Configure ----
      STAGE_START=$(date +%s)
      sccache --zero-stats

      cmake -S "$WORKSPACE_ROOT/llvm-project/llvm" -B "$BUILD_DIR" \
        -D LLVM_ENABLE_PROJECTS="clang;clang-tools-extra;lld;mlir;polly;bolt;flang" \
        -D LLVM_ENABLE_RUNTIMES="compiler-rt;libcxx;libcxxabi;libunwind" \
        -G Ninja \
        -D CMAKE_BUILD_TYPE=Release \
        -D LLVM_ENABLE_ASSERTIONS=ON \
        -D LLVM_BUILD_EXAMPLES=OFF \
        -D COMPILER_RT_BUILD_LIBFUZZER=OFF \
        -D LLVM_LIT_ARGS="-v --xunit-xml-output $BUILD_DIR/test-results.xml --use-unique-output-file-name --timeout=1200 --time-tests --succinct" \
        -D LLVM_TARGETS_TO_BUILD="X86" \
        -D LLVM_ENABLE_LLD=ON \
        -D CMAKE_C_COMPILER=clang \
        -D CMAKE_CXX_COMPILER=clang++ \
        -D CMAKE_CXX_FLAGS=-g1 \
        -D CMAKE_C_COMPILER_LAUNCHER=sccache \
        -D CMAKE_CXX_COMPILER_LAUNCHER=sccache \
        -D CMAKE_DISABLE_PRECOMPILE_HEADERS=ON \
        -D LIBCXX_CXX_ABI=libcxxabi \
        -D MLIR_ENABLE_BINDINGS_PYTHON=ON \
        -D CMAKE_INSTALL_PREFIX="$BUILD_DIR/install" \
        -D CMAKE_EXE_LINKER_FLAGS="-no-pie" \
        -D LLVM_ENABLE_WERROR=OFF
      CMAKE_RET=$?
      STAGE_END=$(date +%s)
      echo "$((STAGE_END - STAGE_START))|cmake-configure|$( [ $CMAKE_RET -eq 0 ] && echo SUCCESS || echo FAIL )" > "$WORKSPACE_ROOT/tmp/timing/configure.log"

      if [ $CMAKE_RET -ne 0 ]; then
        echo "CMake configure failed with exit code $CMAKE_RET"
        sccache --show-stats
        exit 1
      fi

      # ---- Build ----
      STAGE_START=$(date +%s)
      ninja -C "$BUILD_DIR" -j$(nproc) -k 0 2>&1 | tee "$WORKSPACE_ROOT/tmp/ninja-build.log"
      BUILD_RET=${PIPESTATUS[0]}
      STAGE_END=$(date +%s)
      echo "$((STAGE_END - STAGE_START))|build|$( [ $BUILD_RET -eq 0 ] && echo SUCCESS || echo FAIL )" > "$WORKSPACE_ROOT/tmp/timing/build.log"

      sccache --show-stats
      sccache --show-stats > "$WORKSPACE_ROOT/tmp/timing/sccache-build.txt" 2>&1

      if [ $BUILD_RET -ne 0 ]; then
        echo "Build failed with exit code $BUILD_RET"
        exit 1
      fi

      # ---- Tests (run all, collect results) ----
      OVERALL_RET=0

      for target in check-llvm check-clang check-lld check-mlir check-polly check-bolt check-flang; do
        STAGE_START=$(date +%s)
        echo ""
        echo "=== Running $target ==="
        ninja -C "$BUILD_DIR" "$target" 2>&1 | tee "$WORKSPACE_ROOT/tmp/${target}.log"
        RET=${PIPESTATUS[0]}
        STAGE_END=$(date +%s)
        STATUS=$( [ $RET -eq 0 ] && echo "SUCCESS" || echo "FAIL" )
        echo "$((STAGE_END - STAGE_START))|${target}|${STATUS}" > "$WORKSPACE_ROOT/tmp/timing/${target}.log"
        [ $RET -ne 0 ] && OVERALL_RET=1
      done

      # ---- Report ----
      echo ""
      echo "=== RWX CI PERFORMANCE REPORT ==="
      echo ""
      echo "Task Timings (sorted by duration):"
      echo "------------------------------------------------------------"
      cat "$WORKSPACE_ROOT/tmp/timing"/*.log 2>/dev/null | sort -t'|' -k1 -rn | while IFS='|' read -r duration task status; do
        printf "  %-30s %6ss  [%s]\n" "$task" "$duration" "$status"
      done
      echo ""

      TOTAL=0
      while IFS='|' read -r duration task status; do
        TOTAL=$((TOTAL + duration))
      done < <(cat "$WORKSPACE_ROOT/tmp/timing"/*.log 2>/dev/null)
      echo "Total: ${TOTAL}s"

      FAILURES=$(cat "$WORKSPACE_ROOT/tmp/timing"/*.log 2>/dev/null | grep -c "FAIL" || true)
      if [ "$FAILURES" -gt 0 ]; then
        echo ""
        echo "FAILED:"
        cat "$WORKSPACE_ROOT/tmp/timing"/*.log 2>/dev/null | grep "FAIL" | while IFS='|' read -r d t s; do
          echo "  - $t (${d}s)"
        done
      fi

      echo ""
      echo "Sccache Stats:"
      echo "------------------------------------------------------------"
      cat "$WORKSPACE_ROOT/tmp/timing/sccache-build.txt" 2>/dev/null

      exit $OVERALL_RET
    filter:
      - build/**
      - llvm-project/**
      - tmp/**
      - .rwx/ci.yml
